services:
  web:
    build: .
    image: sino-modern-vision:latest
    container_name: sino-modern-vision
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PORT: 80
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
