services:
  # MySQL 8 — espelho local do banco gerenciado da TurboCloud (Model B).
  # O schema do app é carregado uma única vez no primeiro boot (volume vazio)
  # via /docker-entrypoint-initdb.d. As tabelas do Better-auth NÃO entram aqui:
  # são criadas depois por `npm run auth:migrate` (server/).
  db:
    image: mysql:8.0
    container_name: sino-mysql
    restart: unless-stopped
    command: --default-authentication-plugin=caching_sha2_password
    ports:
      - "3307:3306"            # host 3307 → bate com server/.env e .env raiz
    environment:
      MYSQL_ROOT_PASSWORD: sino_root
      MYSQL_DATABASE: sino     # schema.sql é aplicado dentro deste database
    volumes:
      - sino_mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/views.sql:/docker-entrypoint-initdb.d/02-views.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-psino_root"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # API Hono/Node — backend que substitui Supabase (auth, dados, storage, feed).
  # Fala com o MySQL via DNS interno do compose (host = db). Não precisa publicar
  # a porta: o nginx do `web` faz proxy de /api → api:4001. Publicamos mesmo assim
  # (4001) só para debug direto (curl /health).
  api:
    build: ./server
    image: sino-modern-vision-api:latest
    container_name: sino-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4001:4001"
    environment:
      NODE_ENV: production
      PORT: 4001
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: sino_root
      MYSQL_DATABASE: sino
      AUTH_SECRET: dev_sino_secret_change_me_0123456789abcdef
      AUTH_TRUSTED_ORIGINS: http://localhost:8080
      APP_PUBLIC_URL: http://localhost:8080
      UPLOADS_DIR: /data/uploads
      PUBLIC_UPLOADS_URL: /api/storage
    volumes:
      - sino_uploads:/data/uploads
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  web:
    build: .
    image: sino-modern-vision:latest
    container_name: sino-modern-vision
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"
    environment:
      PORT: 80
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  sino_mysql_data:
  sino_uploads:
