server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip pra reduzir banda
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Assets buildados pelo Vite têm hash no nome → safe pra cachear long-term
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Backend: repassa /api/* para o serviço `api` (mesma origem → sem CORS e
    # cookies de sessão funcionam). proxy_pass sem URI preserva o prefixo /api.
    location /api/ {
        proxy_pass http://api:4001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        # uploads podem ser grandes (fotos/PDF)
        client_max_body_size 25m;
    }

    # SPA fallback: qualquer rota não-arquivo cai em index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check leve pro orquestrador (Turbo Cloud usa por padrão)
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Não logar favicon/robots ausentes
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
